# Prometheus configuration for MediTrack

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3001']
    metrics_path: '/metrics'

  - job_name: 'appointment-service'
    static_configs:
      - targets: ['appointment-service:3002']
    metrics_path: '/metrics'

  - job_name: 'medical-service'
    static_configs:
      - targets: ['medical-service:3003']
    metrics_path: '/metrics'

  - job_name: 'pharmacy-service'
    static_configs:
      - targets: ['pharmacy-service:3004']
    metrics_path: '/metrics'

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3005']
    metrics_path: '/metrics'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:3006']
    metrics_path: '/metrics'
